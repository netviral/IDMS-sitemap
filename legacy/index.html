<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMS | superyou.in Sitemap</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <h1 id="themeToggle" style="cursor: pointer; user-select: none;">IDMS</h1>
            <span>/ superyou.in explorer</span>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="stat-products" style="color:var(--accent)">-</div>
                <div class="stat-label">Products</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-blogs" style="color:var(--accent3)">-</div>
                <div class="stat-label">Blogs</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-collections" style="color:var(--accent2)">-</div>
                <div class="stat-label">Collections</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-pages" style="color:var(--accent4)">-</div>
                <div class="stat-label">Pages</div>
            </div>
        </div>
    </header>

    <div class="controls">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="collections">Collections</button>
        <button class="filter-btn" data-filter="blogs">Blogs</button>
        <button class="filter-btn" data-filter="pages">Pages</button>
        <button class="filter-btn" data-filter="products">Products</button>
        <button class="expand-all" id="expandAll">Expand All</button>
    </div>

    <div class="tree-container" id="tree">
        <!-- Tree will be injected here -->
    </div>

    <div class="url-tooltip" id="tooltip"></div>

    <script src="./sitemap-data-content.js"></script>
    <script src="./data.js"></script>
    <script src="./visualizer.js"></script>
</body>

</html>
